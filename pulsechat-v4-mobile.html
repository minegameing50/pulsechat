<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PulseChat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:#0e0e10}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px}
input,textarea,button{font-family:'Inter',sans-serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div id="root"></div>

<!-- ═══════════════════════════════════════════════
  🔥 PASTE YOUR FIREBASE CONFIG HERE
  Steps:
  1. Go to console.firebase.google.com
  2. Open your project → ⚙️ Project Settings
  3. Scroll to "Your apps" → click </>
  4. Copy values and paste below
  5. Also enable: Authentication → Email/Password → Enable
  6. Also enable: Build → Realtime Database → Test mode
═══════════════════════════════════════════════ -->
<script>
window.FB_CFG = {
  apiKey:            "PASTE_apiKey_HERE",
  authDomain:        "PASTE_authDomain_HERE",
  databaseURL:       "PASTE_databaseURL_HERE",
  projectId:         "PASTE_projectId_HERE",
  storageBucket:     "PASTE_storageBucket_HERE",
  messagingSenderId: "PASTE_messagingSenderId_HERE",
  appId:             "PASTE_appId_HERE"
};
</script>

<script type="text/babel">
const {useState,useEffect,useRef,useMemo} = React;

const PALETTE = ["#6C63FF","#FF6584","#43C59E","#F5A623","#4ECDC4","#FF6B6B","#A78BFA","#34D399","#F472B6","#60A5FA"];
const AVATARS  = ["🦊","🐺","🦁","🐯","🦝","🐸","🦄","🐙","🦋","🐬","🦅","🌟","🐻","🦈","🐧"];
const genId    = ()=> Math.random().toString(36).slice(2)+Date.now().toString(36);
const fmtTime  = ts=> new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const fmtDate  = ts=>{
  const d=new Date(ts),now=new Date();
  if(d.toDateString()===now.toDateString()) return "Today";
  const y=new Date(now); y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString()) return "Yesterday";
  return d.toLocaleDateString([],{month:"short",day:"numeric"});
};
const dmKey = (a,b)=>[a,b].sort().join("_");

/* ── Firebase init ── */
const cfg = window.FB_CFG;
const isReady = cfg && cfg.apiKey && !cfg.apiKey.includes("PASTE");
let auth=null, db=null;
if(isReady){
  try{ firebase.initializeApp(cfg); auth=firebase.auth(); db=firebase.database(); }
  catch(e){ console.error(e); }
}

/* ══════════════════════════════════
   SETUP SCREEN
══════════════════════════════════ */
function SetupScreen(){
  return(
    <div style={{minHeight:"100vh",background:"#0e0e10",display:"flex",alignItems:"center",
      justifyContent:"center",padding:24,
      backgroundImage:"radial-gradient(ellipse at 30% 40%,#1a0a3e 0%,transparent 55%)"}}>
      <div style={{maxWidth:500,width:"100%",background:"rgba(255,255,255,0.04)",
        border:"1px solid rgba(255,255,255,0.08)",borderRadius:20,padding:"40px 36px",
        animation:"fadeUp .4s ease"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:46,marginBottom:10}}>🔥</div>
          <div style={{fontSize:22,fontWeight:700,color:"#fff"}}>Firebase Setup Required</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:6,letterSpacing:2}}>FREE · NO CREDIT CARD</div>
        </div>
        {[
          ["1","Create a Firebase project",<>Go to <a href="https://console.firebase.google.com" target="_blank" style={{color:"#6C63FF"}}>console.firebase.google.com</a> → Add project (free)</>],
          ["2","Enable Email/Password Auth","Authentication → Sign-in method → Email/Password → Enable (first toggle)"],
          ["3","Enable Realtime Database","Build → Realtime Database → Create database → Start in test mode"],
          ["4","Get your config & paste it","⚙️ Project Settings → Your apps → </> → copy firebaseConfig values into this file"],
        ].map(([n,t,d])=>(
          <div key={n} style={{display:"flex",gap:14,marginBottom:20,alignItems:"flex-start"}}>
            <div style={{width:28,height:28,borderRadius:"50%",
              background:"linear-gradient(135deg,#6C63FF,#4F46E5)",flexShrink:0,
              display:"flex",alignItems:"center",justifyContent:"center",
              color:"#fff",fontSize:12,fontWeight:700,marginTop:1}}>{n}</div>
            <div>
              <div style={{color:"#fff",fontSize:13,fontWeight:600,marginBottom:4}}>{t}</div>
              <div style={{color:"rgba(255,255,255,0.38)",fontSize:12,lineHeight:1.7}}>{d}</div>
            </div>
          </div>
        ))}
        <div style={{marginTop:8,padding:"14px 16px",background:"rgba(52,211,153,0.08)",
          border:"1px solid rgba(52,211,153,0.2)",borderRadius:12,
          fontSize:12,color:"rgba(255,255,255,0.45)",lineHeight:1.8}}>
          ✅ Email/Password auth is <b style={{color:"#34D399"}}>100% free</b> on Firebase Spark plan — no phone or credit card needed.
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   AUTH SCREEN  (Login / Register)
══════════════════════════════════ */
function AuthScreen({onAuth}){
  const [mode,    setMode]   = useState("login"); // login | register
  const [name,    setName]   = useState("");
  const [email,   setEmail]  = useState("");
  const [pass,    setPass]   = useState("");
  const [loading, setLoad]   = useState(false);
  const [error,   setError]  = useState("");
  const [showPass,setShowP]  = useState(false);

  const handleSubmit = async()=>{
    setError("");
    if(!email.trim()||!pass.trim()){ setError("Fill in all fields"); return; }
    if(mode==="register"&&!name.trim()){ setError("Enter your name"); return; }
    if(pass.length<6){ setError("Password must be at least 6 characters"); return; }
    setLoad(true);
    try{
      let uid, userEmail;
      if(mode==="register"){
        const res = await auth.createUserWithEmailAndPassword(email.trim(), pass);
        uid = res.user.uid; userEmail = res.user.email;
        const ci = name.charCodeAt(0)%PALETTE.length;
        const profile = {
          uid, name:name.trim(), email:userEmail,
          color:PALETTE[ci], avatar:AVATARS[ci%AVATARS.length],
          joinedAt:Date.now()
        };
        await db.ref(`users/${uid}`).set(profile);
        onAuth(profile);
      } else {
        const res = await auth.signInWithEmailAndPassword(email.trim(), pass);
        uid = res.user.uid;
        const snap = await db.ref(`users/${uid}`).once("value");
        if(snap.exists()) onAuth(snap.val());
        else setError("Account not found. Please register first.");
      }
    }catch(e){
      const msgs = {
        "auth/email-already-in-use":"Email already registered. Try logging in.",
        "auth/user-not-found":"No account with this email. Register first.",
        "auth/wrong-password":"Wrong password. Try again.",
        "auth/invalid-email":"Enter a valid email address.",
        "auth/too-many-requests":"Too many attempts. Try again later.",
        "auth/invalid-credential":"Wrong email or password.",
      };
      setError(msgs[e.code]||e.message||"Something went wrong");
    }
    setLoad(false);
  };

  const inp = (extra={})=>({
    width:"100%", padding:"13px 16px",
    background:"rgba(255,255,255,0.06)",
    border:"1px solid rgba(255,255,255,0.1)",
    borderRadius:12, color:"#fff", fontSize:14,
    outline:"none", display:"block", marginBottom:12,
    transition:"border-color .2s",
    ...extra
  });

  return(
    <div style={{minHeight:"100vh",background:"#0e0e10",display:"flex",
      alignItems:"center",justifyContent:"center",padding:20,
      backgroundImage:"radial-gradient(ellipse at 20% 50%,#1a0a3e 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#0a1a3e 0%,transparent 60%)"}}>
      <div style={{width:380,background:"rgba(255,255,255,0.03)",
        border:"1px solid rgba(255,255,255,0.08)",borderRadius:22,
        padding:"44px 36px",animation:"fadeUp .4s ease"}}>

        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:46,marginBottom:10,
            filter:"drop-shadow(0 0 24px rgba(108,99,255,.7))"}}>💬</div>
          <div style={{fontSize:28,fontWeight:700,color:"#fff"}}>
            Pulse<span style={{color:"#6C63FF"}}>Chat</span>
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.25)",marginTop:6,letterSpacing:3}}>
            {mode==="login"?"WELCOME BACK":"CREATE ACCOUNT"}
          </div>
        </div>

        {/* Tab switcher */}
        <div style={{display:"flex",background:"rgba(255,255,255,0.05)",
          borderRadius:12,padding:4,marginBottom:24}}>
          {["login","register"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setError("");}}
              style={{flex:1,padding:"9px",border:"none",borderRadius:9,
                background:mode===m?"linear-gradient(135deg,#6C63FF,#4F46E5)":"transparent",
                color:mode===m?"#fff":"rgba(255,255,255,0.4)",
                fontSize:13,fontWeight:600,cursor:"pointer",transition:"all .2s"}}>
              {m==="login"?"Login":"Register"}
            </button>
          ))}
        </div>

        {/* Fields */}
        {mode==="register"&&(
          <input value={name} onChange={e=>setName(e.target.value)}
            placeholder="Your name"
            style={inp()}
            onFocus={e=>e.target.style.borderColor="rgba(108,99,255,.6)"}
            onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.1)"}
          />
        )}

        <input value={email} onChange={e=>setEmail(e.target.value)}
          placeholder="Email address" type="email"
          style={inp()}
          onFocus={e=>e.target.style.borderColor="rgba(108,99,255,.6)"}
          onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.1)"}
        />

        <div style={{position:"relative",marginBottom:12}}>
          <input value={pass} onChange={e=>setPass(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
            placeholder="Password (min 6 chars)"
            type={showPass?"text":"password"}
            style={inp({marginBottom:0,paddingRight:44})}
            onFocus={e=>e.target.style.borderColor="rgba(108,99,255,.6)"}
            onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.1)"}
          />
          <button onClick={()=>setShowP(s=>!s)}
            style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",
              background:"none",border:"none",color:"rgba(255,255,255,0.35)",
              cursor:"pointer",fontSize:16,padding:0}}>
            {showPass?"🙈":"👁"}
          </button>
        </div>

        {/* Avatar preview for register */}
        {mode==="register"&&name&&(
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14,
            padding:"10px 14px",background:"rgba(108,99,255,0.08)",
            border:"1px solid rgba(108,99,255,0.2)",borderRadius:12}}>
            <div style={{width:36,height:36,borderRadius:"50%",
              background:PALETTE[name.charCodeAt(0)%PALETTE.length]+"33",
              border:`2px solid ${PALETTE[name.charCodeAt(0)%PALETTE.length]}`,
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
              {AVATARS[name.charCodeAt(0)%AVATARS.length]}
            </div>
            <div>
              <div style={{color:"#fff",fontWeight:600,fontSize:13}}>{name}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>Your profile preview</div>
            </div>
          </div>
        )}

        {error&&(
          <div style={{color:"#FF6B6B",fontSize:12,marginBottom:14,padding:"10px 14px",
            background:"rgba(255,107,107,0.1)",border:"1px solid rgba(255,107,107,0.2)",
            borderRadius:10,lineHeight:1.5}}>{error}</div>
        )}

        <button onClick={handleSubmit} disabled={loading}
          style={{width:"100%",padding:"14px",
            background:"linear-gradient(135deg,#6C63FF,#4F46E5)",
            border:"none",borderRadius:12,color:"#fff",fontSize:14,
            fontWeight:700,cursor:"pointer",letterSpacing:.5,
            opacity:loading?.7:1,transition:"opacity .2s"}}>
          {loading
            ? <span>PLEASE WAIT <span className="spin">⟳</span></span>
            : mode==="login" ? "LOGIN →" : "CREATE ACCOUNT →"
          }
        </button>

        <div style={{marginTop:18,textAlign:"center",fontSize:12,color:"rgba(255,255,255,0.25)"}}>
          {mode==="login"
            ? <>No account? <span style={{color:"#6C63FF",cursor:"pointer"}} onClick={()=>{setMode("register");setError("");}}>Register here</span></>
            : <>Have an account? <span style={{color:"#6C63FF",cursor:"pointer"}} onClick={()=>{setMode("login");setError("");}}>Login</span></>
          }
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   MAIN CHAT
══════════════════════════════════ */
function ChatApp({user,onSignOut}){
  const [activeChat,  setActiveChat]  = useState(null);
  const [messages,    setMessages]    = useState([]);
  const [users,       setUsers]       = useState({});
  const [dmPreviews,  setDmPreviews]  = useState({});
  const [unread,      setUnread]      = useState({});
  const [input,       setInput]       = useState("");
  const [search,      setSearch]      = useState("");
  const [sidebar,     setSidebar]     = useState(true);
  const bottomRef = useRef(null);
  const presTimer = useRef(null);
  const activeChatRef = useRef(activeChat);
  useEffect(()=>{ activeChatRef.current=activeChat; },[activeChat]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[messages]);

  /* presence */
  useEffect(()=>{
    const write=()=>db.ref(`presence/${user.uid}`).set({
      uid:user.uid,name:user.name,color:user.color,avatar:user.avatar,ts:Date.now()
    });
    write();
    presTimer.current=setInterval(write,10000);
    db.ref(`presence/${user.uid}`).onDisconnect().remove();
    return()=>{clearInterval(presTimer.current);db.ref(`presence/${user.uid}`).remove();};
  },[]);

  /* all users */
  useEffect(()=>{
    const ref=db.ref("users");
    ref.on("value",snap=>setUsers(snap.val()||{}));
    return()=>ref.off();
  },[]);

  /* messages for active chat */
  useEffect(()=>{
    if(!activeChat) return;
    const path=activeChat.type==="group"
      ?"groupMessages"
      :`dms/${dmKey(user.uid,activeChat.id)}`;
    const ref=db.ref(path).limitToLast(120);
    ref.on("value",snap=>{
      const data=snap.val()||{};
      setMessages(Object.values(data).sort((a,b)=>a.ts-b.ts));
    });
    setUnread(p=>({...p,[activeChat.id]:0}));
    return()=>ref.off();
  },[activeChat]);

  /* DM previews + unread */
  useEffect(()=>{
    const uids=Object.keys(users).filter(u=>u!==user.uid);
    const offs=[];
    uids.forEach(uid=>{
      const ref=db.ref(`dms/${dmKey(user.uid,uid)}`).limitToLast(1);
      const fn=snap=>{
        const data=snap.val();
        if(!data) return;
        const last=Object.values(data)[0];
        setDmPreviews(p=>({...p,[uid]:last}));
        if(last.senderUid!==user.uid && activeChatRef.current?.id!==uid){
          setUnread(p=>({...p,[uid]:(p[uid]||0)+1}));
        }
      };
      ref.on("value",fn);
      offs.push(()=>ref.off("value",fn));
    });
    return()=>offs.forEach(f=>f());
  },[users]);

  const send=async()=>{
    const text=input.trim();
    if(!text||!activeChat) return;
    setInput("");
    const msg={id:genId(),text,senderUid:user.uid,senderName:user.name,
      color:user.color,avatar:user.avatar,ts:Date.now()};
    const path=activeChat.type==="group"
      ?"groupMessages"
      :`dms/${dmKey(user.uid,activeChat.id)}`;
    await db.ref(path).push(msg);
  };

  const openDM=uid=>{
    const u=users[uid]; if(!u) return;
    openChat({type:"dm",id:uid,name:u.name,color:u.color,avatar:u.avatar});
    setUnread(p=>({...p,[uid]:0}));
  };

  const totalUnread=Object.values(unread).reduce((a,b)=>a+b,0);

  // ── Mobile detection ──
  const [isMobile, setIsMobile] = useState(()=>window.innerWidth<768);
  useEffect(()=>{
    const fn=()=>setIsMobile(window.innerWidth<768);
    window.addEventListener("resize",fn);
    return()=>window.removeEventListener("resize",fn);
  },[]);

  // On mobile: open chat hides sidebar; close chat shows sidebar
  const openChat=(chat)=>{
    setActiveChat(chat);
    if(isMobile) setSidebar(false);
  };
  const goBack=()=>{
    setActiveChat(null);
    setSidebar(true);
  };

  const filteredUsers=useMemo(()=>
    Object.values(users).filter(u=>u.uid!==user.uid&&
      u.name?.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      const ta=dmPreviews[a.uid]?.ts||0;
      const tb=dmPreviews[b.uid]?.ts||0;
      return tb-ta;
    })
  ,[users,search,dmPreviews]);

  const grouped=useMemo(()=>{
    const g=[];let lastD="";
    messages.forEach(m=>{
      const d=fmtDate(m.ts);
      if(d!==lastD){g.push({type:"date",label:d});lastD=d;}
      g.push({type:"msg",...m});
    });
    return g;
  },[messages]);

  const SB_W = 300;
  // On mobile sidebar is full screen when open
  const sidebarWidth = isMobile ? "100%" : (sidebar ? SB_W : 0);
  const showMain = !isMobile || (isMobile && !sidebar);

  return(
    <div style={{height:"100vh",display:"flex",background:"#0e0e10",overflow:"hidden",position:"relative"}}>

      {/* ── SIDEBAR ── */}
      <div style={{
        width: isMobile ? "100%" : (sidebar ? SB_W : 0),
        minWidth: isMobile ? (sidebar ? "100%" : 0) : (sidebar ? SB_W : 0),
        position: isMobile ? "absolute" : "relative",
        left:0, top:0, bottom:0, zIndex: isMobile ? 10 : 1,
        background:"#13131a",borderRight:"1px solid rgba(255,255,255,0.06)",
        display: isMobile && !sidebar ? "none" : "flex",
        flexDirection:"column",
        transition:"all .25s ease",overflow:"hidden",flexShrink:0}}>

        {/* My profile */}
        <div style={{padding:"16px 14px 12px",
          borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <div style={{width:40,height:40,borderRadius:"50%",flexShrink:0,
              background:user.color+"33",border:`2px solid ${user.color}`,
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>
              {user.avatar}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{color:"#fff",fontWeight:600,fontSize:14,
                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",
                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</div>
            </div>
            <button onClick={onSignOut}
              style={{padding:"5px 10px",background:"rgba(255,255,255,0.05)",
                border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,
                color:"rgba(255,255,255,0.35)",fontSize:11,cursor:"pointer",flexShrink:0}}>
              Out
            </button>
          </div>
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:11,top:"50%",
              transform:"translateY(-50%)",fontSize:13,
              color:"rgba(255,255,255,0.25)"}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Search people..."
              style={{width:"100%",padding:"9px 12px 9px 32px",
                background:"rgba(255,255,255,0.05)",
                border:"1px solid rgba(255,255,255,0.08)",
                borderRadius:10,color:"#fff",fontSize:13,outline:"none"}}
            />
          </div>
        </div>

        {/* List */}
        <div style={{flex:1,overflowY:"auto",padding:"8px"}}>

          {/* Global channel */}
          <div style={{fontSize:10,color:"rgba(255,255,255,0.2)",
            letterSpacing:2,padding:"6px 8px 4px",fontWeight:600}}>CHANNELS</div>
          <ChatRow
            icon="🌐" name="Global Chat" sub="Everyone can see this"
            color="#6C63FF" shape="square"
            active={activeChat?.id==="main"}
            onClick={()=>openChat({type:"group",id:"main",
              name:"Global Chat",color:"#6C63FF",avatar:"🌐"})}
          />

          {/* DM list */}
          <div style={{fontSize:10,color:"rgba(255,255,255,0.2)",
            letterSpacing:2,padding:"14px 8px 4px",fontWeight:600}}>
            DIRECT MESSAGES
          </div>

          {filteredUsers.length===0&&search&&(
            <div style={{padding:"20px 8px",textAlign:"center",
              color:"rgba(255,255,255,0.2)",fontSize:13}}>No users found</div>
          )}
          {filteredUsers.length===0&&!search&&(
            <div style={{padding:"16px 8px",textAlign:"center",
              color:"rgba(255,255,255,0.18)",fontSize:12,lineHeight:1.8}}>
              No other users yet.<br/>Share the link so friends can join!
            </div>
          )}

          {filteredUsers.map(u=>{
            const last=dmPreviews[u.uid];
            const badge=unread[u.uid]||0;
            const sub=last
              ?(last.senderUid===user.uid?"You: ":"")+last.text
              :u.email;
            return(
              <ChatRow key={u.uid}
                icon={u.avatar} name={u.name} sub={sub}
                color={u.color} shape="circle"
                active={activeChat?.id===u.uid}
                badge={badge}
                time={last?.ts}
                onClick={()=>openDM(u.uid)}
              />
            );
          })}
        </div>
      </div>

      {/* ── MAIN ── */}
      <div style={{flex:1,display: showMain ? "flex" : "none",flexDirection:"column",minWidth:0,
        position: isMobile ? "absolute" : "relative",
        left:0,right:0,top:0,bottom:0,zIndex: isMobile ? 5 : 1,
        background:"#0e0e10"}}>

        {/* Top bar */}
        <div style={{height:56,padding:"0 16px",display:"flex",alignItems:"center",
          justifyContent:"space-between",flexShrink:0,
          borderBottom:"1px solid rgba(255,255,255,0.06)",
          background:"rgba(13,13,26,0.95)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {/* Back button on mobile / Hamburger on desktop */}
            {isMobile && activeChat ? (
              <button onClick={goBack}
                style={{width:36,height:36,background:"rgba(255,255,255,0.05)",
                  border:"1px solid rgba(255,255,255,0.08)",borderRadius:9,
                  color:"rgba(255,255,255,0.7)",fontSize:18,cursor:"pointer",
                  display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                ←
              </button>
            ) : !isMobile ? (
              <button onClick={()=>setSidebar(s=>!s)}
                style={{width:36,height:36,background:"rgba(255,255,255,0.05)",
                  border:"1px solid rgba(255,255,255,0.08)",borderRadius:9,
                  color:"rgba(255,255,255,0.6)",fontSize:15,cursor:"pointer",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  position:"relative",flexShrink:0}}>
                ☰
                {!sidebar&&totalUnread>0&&(
                  <div style={{position:"absolute",top:-4,right:-4,width:17,height:17,
                    borderRadius:"50%",background:"#6C63FF",fontSize:9,color:"#fff",
                    display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>
                    {totalUnread>9?"9+":totalUnread}
                  </div>
                )}
              </button>
            ) : null}

            {activeChat?(
              <>
                <div style={{width:36,height:36,
                  borderRadius:activeChat.type==="group"?10:"50%",
                  background:activeChat.color+"33",
                  border:`2px solid ${activeChat.color}55`,
                  display:"flex",alignItems:"center",
                  justifyContent:"center",fontSize:18}}>
                  {activeChat.avatar}
                </div>
                <div>
                  <div style={{color:"#fff",fontWeight:600,fontSize:15}}>{activeChat.name}</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>
                    {activeChat.type==="group"
                      ?`${Object.keys(users).length} members`
                      :"Private message · end to end"}
                  </div>
                </div>
              </>
            ):(
              <div style={{color:"rgba(255,255,255,0.35)",fontSize:14}}>
                Select a chat to start messaging
              </div>
            )}
          </div>

          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:"#34D399",
              boxShadow:"0 0 8px #34D399",animation:"pulse 2s infinite"}}/>
            <span style={{fontSize:10,color:"rgba(255,255,255,0.25)",letterSpacing:1}}>LIVE</span>
          </div>
        </div>

        {/* Messages */}
        <div style={{flex:1,overflowY:"auto",padding:"16px 20px 8px"}}>
          {!activeChat&&(
            <div style={{height:"100%",display:"flex",flexDirection:"column",
              alignItems:"center",justifyContent:"center",gap:14,
              color:"rgba(255,255,255,0.12)"}}>
              <div style={{fontSize:60}}>💬</div>
              <div style={{fontSize:18,fontWeight:600,color:"rgba(255,255,255,0.2)"}}>
                Welcome, {user.name}!
              </div>
              <div style={{fontSize:13,textAlign:"center",lineHeight:1.9,maxWidth:300,
                color:"rgba(255,255,255,0.18)"}}>
                Open <span style={{color:"#6C63FF"}}>Global Chat</span> to talk to everyone,<br/>
                or pick someone from the list for a <span style={{color:"#34D399"}}>private message</span>.
              </div>
            </div>
          )}

          {activeChat&&grouped.map((item,i)=>{
            if(item.type==="date") return(
              <div key={i} style={{textAlign:"center",margin:"18px 0 10px"}}>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.25)",
                  background:"rgba(255,255,255,0.05)",padding:"4px 14px",borderRadius:20}}>
                  {item.label}
                </span>
              </div>
            );
            const isMe=item.senderUid===user.uid;
            const prev=grouped[i-1];
            const showHead=!prev||prev.type==="date"||prev.senderUid!==item.senderUid;
            return(
              <div key={item.id||i} style={{display:"flex",
                flexDirection:isMe?"row-reverse":"row",
                alignItems:"flex-end",gap:8,
                marginTop:showHead?14:3}}>
                {showHead
                  ?<div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,
                      background:item.color+"33",border:`2px solid ${item.color}44`,
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>
                    {item.avatar}
                  </div>
                  :<div style={{width:32,flexShrink:0}}/>
                }
                <div style={{maxWidth:"65%"}}>
                  {showHead&&!isMe&&(
                    <div style={{fontSize:11,marginBottom:4,color:item.color,fontWeight:600}}>
                      {item.senderName}
                      <span style={{color:"rgba(255,255,255,0.2)",fontWeight:400,
                        marginLeft:8}}>{fmtTime(item.ts)}</span>
                    </div>
                  )}
                  <div style={{padding:"10px 14px",wordBreak:"break-word",
                    fontSize:14,lineHeight:1.55,color:"#f0f0f0",
                    background:isMe
                      ?`linear-gradient(135deg,${item.color}28,${item.color}18)`
                      :"rgba(255,255,255,0.06)",
                    border:isMe
                      ?`1px solid ${item.color}30`
                      :"1px solid rgba(255,255,255,0.07)",
                    borderRadius:isMe?"16px 4px 16px 16px":"4px 16px 16px 16px"}}>
                    {item.text}
                  </div>
                  {isMe&&(
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.2)",
                      textAlign:"right",marginTop:3}}>{fmtTime(item.ts)}</div>
                  )}
                </div>
              </div>
            );
          })}
          <div ref={bottomRef}/>
        </div>

        {/* Input */}
        {activeChat&&(
          <div style={{padding: isMobile ? "10px 12px 20px" : "10px 16px 14px",flexShrink:0,
            borderTop:"1px solid rgba(255,255,255,0.06)",
            background:"rgba(13,13,26,0.95)"}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
              <textarea value={input}
                onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
                placeholder={activeChat.type==="group"
                  ?"Message everyone…":`Message ${activeChat.name}…`}
                rows={1}
                style={{flex:1,padding:"11px 14px",resize:"none",
                  background:"rgba(255,255,255,0.06)",
                  border:"1px solid rgba(255,255,255,0.1)",
                  borderRadius:12,color:"#fff",fontSize:isMobile?16:14,
                  outline:"none",lineHeight:1.5,maxHeight:120}}
                onFocus={e=>e.target.style.borderColor="rgba(108,99,255,.5)"}
                onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.1)"}
              />
              <button onClick={send} disabled={!input.trim()}
                style={{width:44,height:44,flexShrink:0,border:"none",borderRadius:12,
                  fontSize:18,cursor:input.trim()?"pointer":"default",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  background:input.trim()
                    ?"linear-gradient(135deg,#6C63FF,#4F46E5)"
                    :"rgba(255,255,255,0.04)",
                  color:input.trim()?"#fff":"rgba(255,255,255,0.2)"}}>↑</button>
            </div>
            {!isMobile&&<div style={{marginTop:7,fontSize:10,letterSpacing:1,
              color:"rgba(255,255,255,0.12)"}}>
              {activeChat.type==="dm"?"🔒 PRIVATE · ":"🌐 PUBLIC · "}
              ENTER TO SEND · SHIFT+ENTER FOR NEW LINE
            </div>}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Reusable sidebar row ── */
function ChatRow({icon,name,sub,color,shape,active,badge,time,onClick}){
  const [hover,setHover]=useState(false);
  return(
    <div onClick={onClick}
      onMouseEnter={()=>setHover(true)}
      onMouseLeave={()=>setHover(false)}
      style={{display:"flex",alignItems:"center",gap:11,padding:"9px 10px",
        borderRadius:12,cursor:"pointer",marginBottom:2,
        background:active?"rgba(108,99,255,0.15)":hover?"rgba(255,255,255,0.04)":"transparent",
        border:active?"1px solid rgba(108,99,255,0.25)":"1px solid transparent",
        transition:"all .15s"}}>
      <div style={{position:"relative",flexShrink:0}}>
        <div style={{width:40,height:40,
          borderRadius:shape==="square"?10:"50%",
          background:color+"33",border:`2px solid ${color}55`,
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:19}}>
          {icon}
        </div>
        {badge>0&&(
          <div style={{position:"absolute",top:-3,right:-3,minWidth:18,height:18,
            borderRadius:9,background:"#6C63FF",padding:"0 4px",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:10,color:"#fff",fontWeight:700}}>
            {badge>9?"9+":badge}
          </div>
        )}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
          <div style={{color:"#fff",fontWeight:600,fontSize:13,
            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
          {time&&<div style={{fontSize:10,color:"rgba(255,255,255,0.25)",flexShrink:0,marginLeft:6}}>
            {fmtTime(time)}
          </div>}
        </div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",
          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sub}</div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   ROOT
══════════════════════════════════ */
function Root(){
  const [user,     setUser]     = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(()=>{
    if(!isReady||!auth){ setChecking(false); return; }
    return auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        try{
          const snap=await db.ref(`users/${fbUser.uid}`).once("value");
          if(snap.exists()) setUser(snap.val());
          else setUser(null);
        }catch{ setUser(null); }
      } else setUser(null);
      setChecking(false);
    });
  },[]);

  if(!isReady) return <SetupScreen/>;

  if(checking) return(
    <div style={{height:"100vh",background:"#0e0e10",display:"flex",
      alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:48,filter:"drop-shadow(0 0 20px rgba(108,99,255,.7))"}}>💬</div>
      <div style={{color:"rgba(255,255,255,0.3)",fontSize:12,letterSpacing:3}}>LOADING...</div>
    </div>
  );

  if(!user) return <AuthScreen onAuth={setUser}/>;
  return <ChatApp user={user} onSignOut={()=>{auth.signOut();setUser(null);}}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
