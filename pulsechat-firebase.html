<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PulseChat – Live</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<!-- Firebase v9 compat (works as plain scripts) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%}
  body{background:#0D0D0F;font-family:'DM Mono',monospace}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  input,textarea,button{font-family:'DM Mono',monospace}
</style>
</head>
<body>
<div id="root"></div>

<!-- ══════════════════════════════════════════════════════
     🔥 STEP 1: PASTE YOUR FIREBASE CONFIG HERE
     Get it from: https://console.firebase.google.com
     Project Settings → Your Apps → Firebase SDK snippet → Config
     ══════════════════════════════════════════════════════ -->
<script>
  window.FIREBASE_CONFIG = {
  apiKey: "AIzaSyAs-M8VVM_hN3smKLmqWSowuUrOFeKVA5s",
  authDomain: "pulsechat-ae532.firebaseapp.com",
  databaseURL: "https://pulsechat-ae532-default-rtdb.firebaseio.com",
  projectId: "pulsechat-ae532",
  storageBucket: "pulsechat-ae532.firebasestorage.app",
  messagingSenderId: "605174393419",
  appId: "1:605174393419:web:37b2eaae15b294bf757bce"
  };
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Colours & Avatars ──────────────────────────────────
const COLORS  = ["#FF6B6B","#FFD93D","#6BCB77","#4D96FF","#FF922B","#CC5DE8","#20C997","#F06595"];
const AVATARS = ["🦊","🐺","🦁","🐯","🦝","🐸","🦄","🐙"];
function genId(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }

// ── Firebase init ──────────────────────────────────────
let db = null;
const cfg = window.FIREBASE_CONFIG;
const isConfigured = cfg && cfg.apiKey && !cfg.apiKey.includes("PASTE");
if(isConfigured){
  try{
    firebase.initializeApp(cfg);
    db = firebase.database();
  }catch(e){ console.error("Firebase init error:",e); }
}

// ── Setup Screen ───────────────────────────────────────
function SetupScreen(){
  return(
    <div style={{minHeight:"100vh",background:"#0D0D0F",display:"flex",alignItems:"center",
      justifyContent:"center",padding:20,
      backgroundImage:"radial-gradient(ellipse at 20% 50%,#1a0a2e 0%,transparent 60%)"}}>
      <div style={{maxWidth:560,width:"100%",padding:"40px 36px",background:"rgba(255,255,255,0.03)",
        border:"1px solid rgba(255,255,255,0.08)",borderRadius:20}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:44,marginBottom:10}}>🔥</div>
          <div style={{fontSize:22,fontWeight:700,color:"#fff"}}>
            Setup Required
          </div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:6,letterSpacing:2}}>
            CONNECT FIREBASE DATABASE
          </div>
        </div>

        {[
          ["1","Create a free Firebase project",
            <>Go to <a href="https://console.firebase.google.com" target="_blank"
              style={{color:"#8B5CF6"}}>console.firebase.google.com</a> → <b>Add project</b> (it's free)</>],
          ["2","Enable Realtime Database",
            "Build → Realtime Database → Create database → Start in test mode"],
          ["3","Get your config",
            "Project Settings (⚙️) → Your apps → Add app (</>) → Copy the firebaseConfig object"],
          ["4","Paste config into this file",
            "Open pulsechat-firebase.html in a text editor, find the FIREBASE_CONFIG block near the top, and replace each PASTE_YOUR_…_HERE value with your real values"],
          ["5","Open & share",
            "Open the file in your browser. Share it with anyone — messages sync in real-time across all devices worldwide!"],
        ].map(([n,title,desc])=>(
          <div key={n} style={{display:"flex",gap:16,marginBottom:20,alignItems:"flex-start"}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#7C3AED,#4F46E5)",
              display:"flex",alignItems:"center",justifyContent:"center",
              color:"#fff",fontSize:12,fontWeight:700,flexShrink:0,marginTop:2}}>{n}</div>
            <div>
              <div style={{color:"#fff",fontSize:13,fontWeight:600,marginBottom:4}}>{title}</div>
              <div style={{color:"rgba(255,255,255,0.4)",fontSize:12,lineHeight:1.7}}>{desc}</div>
            </div>
          </div>
        ))}

        <div style={{marginTop:24,padding:"14px 16px",background:"rgba(139,92,246,0.08)",
          border:"1px solid rgba(139,92,246,0.2)",borderRadius:12,
          fontSize:11,color:"rgba(255,255,255,0.5)",lineHeight:1.8}}>
          💡 <b style={{color:"rgba(255,255,255,0.7)"}}>Free tier:</b> Firebase Spark plan includes 1GB storage, 10GB/month transfer — more than enough for a chat app.
          <br/>⚠️ <b style={{color:"rgba(255,255,255,0.7)"}}>Security:</b> "Test mode" rules allow anyone to read/write for 30 days. Add auth rules before going public.
        </div>
      </div>
    </div>
  );
}

// ── Main App ───────────────────────────────────────────
function App(){
  if(!isConfigured || !db) return <SetupScreen/>;

  const [screen,   setScreen]   = useState("login");
  const [inputUser,setInputUser]= useState("");
  const [username, setUsername] = useState("");
  const [color,    setColor]    = useState(COLORS[0]);
  const [avatar,   setAvatar]   = useState(AVATARS[0]);
  const [messages, setMessages] = useState([]);
  const [onlineUsers,setOnline] = useState([]);
  const [input,    setInput]    = useState("");
  const [error,    setError]    = useState("");
  const [status,   setStatus]   = useState("connecting");
  const bottomRef  = useRef(null);
  const sessionId  = useRef(genId());
  const presenceRef= useRef(null);
  const presTimerRef=useRef(null);

  // scroll
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[messages]);

  // Firebase listeners
  useEffect(()=>{
    if(screen!=="chat") return;

    // Messages – realtime listener (last 200)
    const msgsRef = db.ref("messages").limitToLast(200);
    msgsRef.on("value", snap => {
      const data = snap.val();
      if(!data){ setMessages([]); return; }
      const arr = Object.values(data).sort((a,b)=>a.ts-b.ts);
      setMessages(arr);
      setStatus("connected");
    }, ()=>setStatus("error"));

    // Presence – write my presence, read others
    const myPresRef = db.ref(`presence/${sessionId.current}`);
    presenceRef.current = myPresRef;
    const writePresence = ()=>{
      myPresRef.set({ username, color, avatar, ts: Date.now() });
    };
    writePresence();
    presTimerRef.current = setInterval(writePresence, 8000);

    // Remove presence on disconnect
    myPresRef.onDisconnect().remove();

    // Read all presence
    const allPresRef = db.ref("presence");
    allPresRef.on("value", snap=>{
      const data = snap.val();
      if(!data){ setOnline([]); return; }
      const now = Date.now();
      const users = Object.values(data).filter(u=>now-u.ts<20000);
      setOnline(users);
    });

    return ()=>{
      msgsRef.off();
      allPresRef.off();
      myPresRef.remove();
      clearInterval(presTimerRef.current);
    };
  },[screen, username, color, avatar]);

  const handleJoin = ()=>{
    const name = inputUser.trim();
    if(!name){ setError("Please enter a username"); return; }
    if(name.length>20){ setError("Max 20 characters"); return; }
    const ci = name.charCodeAt(0) % COLORS.length;
    setColor(COLORS[ci]);
    setAvatar(AVATARS[ci % AVATARS.length]);
    setUsername(name);
    setError("");
    setScreen("chat");
  };

  const handleSend = async ()=>{
    const text = input.trim();
    if(!text) return;
    setInput("");
    try{
      await db.ref("messages").push({
        id:genId(), username, color, avatar, text, ts:Date.now()
      });
    }catch(e){
      setError("Failed to send");
    }
  };

  const fmt = ts => new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});

  // ── LOGIN ──
  if(screen==="login") return(
    <div style={{minHeight:"100vh",background:"#0D0D0F",display:"flex",alignItems:"center",
      justifyContent:"center",
      backgroundImage:"radial-gradient(ellipse at 20% 50%,#1a0a2e 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#0a1a2e 0%,transparent 60%)"}}>
      <div style={{width:360,padding:"48px 36px",background:"rgba(255,255,255,0.03)",
        border:"1px solid rgba(255,255,255,0.08)",borderRadius:20,
        boxShadow:"0 0 80px rgba(100,60,255,0.08)"}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontSize:42,marginBottom:10,filter:"drop-shadow(0 0 20px rgba(150,100,255,0.6))"}}>💬</div>
          <div style={{fontSize:26,fontWeight:700,color:"#fff",letterSpacing:"-0.5px"}}>
            pulse<span style={{color:"#8B5CF6"}}>chat</span>
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.25)",marginTop:5,letterSpacing:3}}>
            LIVE · CROSS-DEVICE
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:8}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:"#20C997",
              boxShadow:"0 0 8px #20C997",animation:"blink 2s infinite"}}/>
            <span style={{fontSize:11,color:"#20C997"}}>Firebase connected</span>
          </div>
        </div>

        <label style={{fontSize:11,color:"rgba(255,255,255,0.35)",letterSpacing:2,display:"block",marginBottom:8}}>
          YOUR HANDLE
        </label>
        <input autoFocus value={inputUser}
          onChange={e=>setInputUser(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handleJoin()}
          placeholder="enter username..."
          maxLength={20}
          style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.05)",
            border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,color:"#fff",
            fontSize:15,outline:"none",marginBottom:10,display:"block"}}
          onFocus={e=>e.target.style.borderColor="rgba(139,92,246,0.6)"}
          onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.1)"}
        />

        {error&&<div style={{color:"#FF6B6B",fontSize:12,marginBottom:10,padding:"8px 12px",
          background:"rgba(255,107,107,0.1)",borderRadius:8}}>{error}</div>}

        <button onClick={handleJoin} style={{width:"100%",padding:"13px",
          background:"linear-gradient(135deg,#7C3AED,#4F46E5)",border:"none",
          borderRadius:10,color:"#fff",fontSize:14,fontWeight:600,
          cursor:"pointer",letterSpacing:1}}>
          JOIN ROOM →
        </button>
      </div>
    </div>
  );

  // ── CHAT ──
  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#0D0D0F",
      backgroundImage:"radial-gradient(ellipse at 0% 100%,#1a0a2e44 0%,transparent 50%)"}}>

      {/* Header */}
      <div style={{height:56,padding:"0 18px",display:"flex",alignItems:"center",
        justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,0.06)",
        background:"rgba(13,13,15,0.97)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>💬</span>
          <span style={{color:"#fff",fontWeight:700,fontSize:15}}>pulse<span style={{color:"#8B5CF6"}}>chat</span></span>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:6,height:6,borderRadius:"50%",
              background:status==="connected"?"#20C997":status==="error"?"#FF6B6B":"#FFD93D",
              boxShadow:`0 0 7px ${status==="connected"?"#20C997":status==="error"?"#FF6B6B":"#FFD93D"}`,
              animation:"blink 2s infinite"}}/>
            <span style={{fontSize:10,color:"rgba(255,255,255,0.25)",letterSpacing:1}}>
              {status==="connected"?"LIVE":status==="error"?"ERROR":"CONNECTING"}
            </span>
          </div>
        </div>

        {/* Online avatars */}
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:10,color:"rgba(255,255,255,0.25)",letterSpacing:2}}>ONLINE</span>
          <div style={{display:"flex"}}>
            {onlineUsers.slice(0,6).map((u,i)=>(
              <div key={i} title={u.username} style={{width:26,height:26,borderRadius:"50%",
                background:u.color+"22",border:`2px solid ${u.color}55`,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:12,marginLeft:i>0?-5:0,zIndex:10-i}}>{u.avatar}</div>
            ))}
          </div>
          <span style={{fontSize:12,color:"#20C997",fontWeight:600}}>{onlineUsers.length}</span>
        </div>

        {/* Me + leave */}
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:15}}>{avatar}</span>
          <span style={{color:color,fontSize:12,fontWeight:600}}>{username}</span>
          <button onClick={()=>{setScreen("login");setInputUser("");}}
            style={{padding:"4px 10px",background:"rgba(255,255,255,0.04)",
              border:"1px solid rgba(255,255,255,0.09)",borderRadius:6,
              color:"rgba(255,255,255,0.35)",fontSize:10,cursor:"pointer",letterSpacing:1}}>
            LEAVE
          </button>
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 18px 8px",
        display:"flex",flexDirection:"column",gap:3}}>
        {messages.length===0&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",
            justifyContent:"center",color:"rgba(255,255,255,0.12)",gap:10}}>
            <div style={{fontSize:44}}>🌌</div>
            <div style={{letterSpacing:3,fontSize:12}}>NO MESSAGES YET</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.07)"}}>be the first to say something</div>
          </div>
        )}
        {messages.map((msg,i)=>{
          const isMe   = msg.username===username;
          const showHead = i===0||messages[i-1].username!==msg.username;
          return(
            <div key={msg.id||i} style={{display:"flex",
              flexDirection:isMe?"row-reverse":"row",
              alignItems:"flex-end",gap:7,
              marginTop:showHead?10:1,animation:"fadeIn 0.18s ease"}}>
              {showHead
                ?<div style={{width:30,height:30,borderRadius:"50%",background:msg.color+"22",
                    border:`2px solid ${msg.color}44`,display:"flex",alignItems:"center",
                    justifyContent:"center",fontSize:14,flexShrink:0}}>{msg.avatar}</div>
                :<div style={{width:30,flexShrink:0}}/>
              }
              <div style={{maxWidth:"65%"}}>
                {showHead&&<div style={{fontSize:10,marginBottom:3,color:msg.color,
                  textAlign:isMe?"right":"left",letterSpacing:0.5}}>
                  {isMe?"you":msg.username}
                  <span style={{color:"rgba(255,255,255,0.2)",marginLeft:6}}>{fmt(msg.ts)}</span>
                </div>}
                <div style={{padding:"9px 13px",
                  background:isMe?`linear-gradient(135deg,${msg.color}28,${msg.color}15)`:"rgba(255,255,255,0.05)",
                  border:isMe?`1px solid ${msg.color}30`:"1px solid rgba(255,255,255,0.07)",
                  borderRadius:isMe?"14px 3px 14px 14px":"3px 14px 14px 14px",
                  color:"#f0f0f0",fontSize:14,lineHeight:1.5,wordBreak:"break-word"}}>
                  {msg.text}
                </div>
              </div>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>

      {/* Input */}
      <div style={{padding:"10px 18px 14px",borderTop:"1px solid rgba(255,255,255,0.06)",
        background:"rgba(13,13,15,0.97)",flexShrink:0}}>
        {error&&<div style={{color:"#FF6B6B",fontSize:11,marginBottom:8}}>{error}</div>}
        <div style={{display:"flex",gap:9,alignItems:"flex-end"}}>
          <textarea value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSend();}}}
            placeholder={`message as ${username}…`}
            rows={1}
            style={{flex:1,padding:"11px 14px",background:"rgba(255,255,255,0.05)",
              border:"1px solid rgba(255,255,255,0.1)",borderRadius:11,color:"#fff",
              fontSize:14,outline:"none",resize:"none",lineHeight:1.5,maxHeight:110}}
            onFocus={e=>e.target.style.borderColor="rgba(139,92,246,0.5)"}
            onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.1)"}
          />
          <button onClick={handleSend} disabled={!input.trim()}
            style={{width:42,height:42,flexShrink:0,
              background:input.trim()?"linear-gradient(135deg,#7C3AED,#4F46E5)":"rgba(255,255,255,0.04)",
              border:"none",borderRadius:11,
              color:input.trim()?"#fff":"rgba(255,255,255,0.2)",
              fontSize:18,cursor:input.trim()?"pointer":"default",
              display:"flex",alignItems:"center",justifyContent:"center"}}>↑</button>
        </div>
        <div style={{marginTop:7,fontSize:10,color:"rgba(255,255,255,0.13)",letterSpacing:1}}>
          ENTER TO SEND · POWERED BY FIREBASE · INSTANT SYNC ACROSS ALL DEVICES
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
