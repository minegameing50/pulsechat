<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;

/* ── colours / avatars ── */
const PALETTE = ["#6C63FF","#FF6584","#43C59E","#F5A623","#4ECDC4","#FF6B6B","#A78BFA","#34D399"];
const AVATARS  = ["🦊","🐺","🦁","🐯","🦝","🐸","🦄","🐙","🦋","🐬","🦅","🌟"];
const genId    = ()=> Math.random().toString(36).slice(2)+Date.now().toString(36);
const fmt      = ts => new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const fmtDate  = ts =>{
  const d=new Date(ts), now=new Date();
  if(d.toDateString()===now.toDateString()) return "Today";
  const y=new Date(now); y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString()) return "Yesterday";
  return d.toLocaleDateString([],{month:"short",day:"numeric"});
};

/* ── firebase ── */
const cfg = window.FB_CFG;
const isReady = cfg && cfg.apiKey && !cfg.apiKey.includes("PASTE");
let auth=null, db=null;
if(isReady){
  try{
    firebase.initializeApp(cfg);
    auth = firebase.auth();
    db   = firebase.database();
  }catch(e){console.error(e);}
}

/* ═══════════════════════════════════════════
   SETUP SCREEN
═══════════════════════════════════════════ */

    <div style={{minHeight:"100vh",background:"#0e0e10",display:"flex",alignItems:"center",
      justifyContent:"center",padding:24,
      backgroundImage:"radial-gradient(ellipse at 30% 40%,#1a0a3e 0%,transparent 55%)"}}>
      <div style={{maxWidth:520,width:"100%",background:"rgba(255,255,255,0.04)",
        border:"1px solid rgba(255,255,255,0.08)",borderRadius:20,padding:"40px 36px"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:46,marginBottom:10}}>🔥</div>
          <div style={{fontSize:22,fontWeight:700,color:"#fff"}}>Firebase Setup Required</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:6,letterSpacing:2}}>TWO SERVICES NEEDED</div>
        </div>
        {[
          ["1","Create Firebase project","console.firebase.google.com → Add project (free)"],
          ["2","Enable Realtime Database","Build → Realtime Database → Create → Test mode"],
          ["3","Enable Phone Auth","Authentication → Sign-in method → Phone → Enable"],
          ["4","Add your domain","Authentication → Settings → Authorized domains → add your GitHub Pages URL"],
          ["5","Paste config into this file","Find FIREBASE_CONFIG block, replace all PASTE_…_HERE values"],
        ].map(([n,t,d])=>(
          <div key={n} style={{display:"flex",gap:14,marginBottom:18,alignItems:"flex-start"}}>

              display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",
              fontSize:11,fontWeight:700,flexShrink:0,marginTop:2}}>{n}</div>

              <div style={{color:"#fff",fontSize:13,fontWeight:600,marginBottom:3}}>{t}</div>

        <div style={{marginTop:20,padding:"12px 14px",background:"rgba(108,99,255,0.08)",

          fontSize:11,color:"rgba(255,255,255,0.4)",lineHeight:1.8}}>

/* ═══════════════════════════════════════════
   PHONE AUTH SCREEN
═══════════════════════════════════════════ */
function AuthScreen({onAuth}){
  const [step,   setStep]   = useState("phone"); // phone | otp | profile
  const [phone,  setPhone]  = useState("");
  const [otp,    setOtp]    = useState("");
  const [name,   setName]   = useState("");
  const [loading,setLoad]   = useState(false);
  const [error,  setError]  = useState("");
  const [confirm,setConfirm]= useState(null);
  const [timer,  setTimer]  = useState(0);
  const recaptchaRef = useRef(null);
  const timerRef     = useRef(null);

  useEffect(()=>{
    // invisible recaptcha
    if(!window.recaptchaVerifier){
      window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier("recaptcha-container",{
        size:"invisible",
        callback:()=>{}
      });
    }
    return ()=>{ clearInterval(timerRef.current); };
  },[]);

  const startTimer = ()=>{
    setTimer(60);
    timerRef.current = setInterval(()=>{
      setTimer(t=>{ if(t<=1){ clearInterval(timerRef.current); return 0; } return t-1; });
    },1000);
  };

  const sendOTP = async ()=>{
    setError("");
    const p = phone.trim();
    if(!p){ setError("Enter your phone number"); return; }
    if(!p.startsWith("+")){ setError("Include country code e.g. +1 234 567 8900"); return; }
    setLoad(true);
    try{
      const confirmation = await auth.signInWithPhoneNumber(p, window.recaptchaVerifier);
      setConfirm(confirmation);
      setStep("otp");
      startTimer();
    }catch(e){
      setError(e.message||"Failed to send OTP");
      window.recaptchaVerifier.render().then(id=>grecaptcha.reset(id));
    }
    setLoad(false);
  };

  const verifyOTP = async ()=>{
    setError("");
    if(otp.length<6){ setError("Enter 6-digit code"); return; }
    setLoad(true);
    try{
      const result = await confirm.confirm(otp);
      const uid    = result.user.uid;
      // check if profile exists
      const snap = await db.ref(`users/${uid}`).once("value");
      if(snap.exists()){
        onAuth({ uid, ...snap.val() });
      } else {
        setStep("profile");
      }
    }catch(e){
      setError("Invalid code. Try again.");
    }
    setLoad(false);
  };

  const saveProfile = async ()=>{
    setError("");
    if(!name.trim()){ setError("Enter your name"); return; }
    setLoad(true);
    try{
      const uid    = auth.currentUser.uid;
      const ci     = name.charCodeAt(0)%PALETTE.length;
      const profile= {
        uid, name:name.trim(),
        phone: auth.currentUser.phoneNumber,
        color: PALETTE[ci],
        avatar:AVATARS[ci%AVATARS.length],
        joinedAt: Date.now()
      };
      await db.ref(`users/${uid}`).set(profile);
      onAuth(profile);
    }catch(e){
      setError("Failed to save profile");
    }
    setLoad(false);
  };

  const inputStyle = {
    width:"100%", padding:"13px 16px",
    background:"rgba(255,255,255,0.06)",
    border:"1px solid rgba(255,255,255,0.1)",
    borderRadius:12, color:"#fff", fontSize:15,
    outline:"none", display:"block", marginBottom:10
  };

  return(
    <div style={{minHeight:"100vh",background:"#0e0e10",display:"flex",alignItems:"center",
      justifyContent:"center",padding:20,
      backgroundImage:"radial-gradient(ellipse at 20% 50%,#1a0a3e 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#0a1a3e 0%,transparent 60%)"}}>
      <div style={{width:360,background:"rgba(255,255,255,0.03)",
        border:"1px solid rgba(255,255,255,0.08)",borderRadius:20,
        padding:"44px 36px",animation:"fadeUp .4s ease"}}>

        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontSize:44,marginBottom:10,filter:"drop-shadow(0 0 24px rgba(108,99,255,.7))"}}>💬</div>
          <div style={{fontSize:26,fontWeight:700,color:"#fff"}}>
            Pulse<span style={{color:"#6C63FF"}}>Chat</span>
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.25)",marginTop:5,letterSpacing:3}}>
            {step==="phone"&&"ENTER YOUR NUMBER"}
            {step==="otp"&&"VERIFY YOUR NUMBER"}
            {step==="profile"&&"CREATE PROFILE"}
          </div>
        </div>

        {/* Progress dots */}
        <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:28}}>
          {["phone","otp","profile"].map(s=>(
            <div key={s} style={{height:4,width:s===step?24:8,borderRadius:4,
              background:s===step?"#6C63FF":
                (step==="otp"&&s==="phone")||(step==="profile"&&s!=="profile")
                ?"#6C63FF44":"rgba(255,255,255,0.1)",
              transition:"all .3s"}}/>
          ))}
        </div>

        {/* ── Phone step ── */}
        {step==="phone"&&<>
          <label style={{fontSize:11,color:"rgba(255,255,255,0.35)",letterSpacing:2,display:"block",marginBottom:8}}>
            PHONE NUMBER
          </label>
          <input value={phone} onChange={e=>setPhone(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&sendOTP()}
            placeholder="+1 234 567 8900"
            style={inputStyle}
            onFocus={e=>e.target.style.borderColor="rgba(108,99,255,.6)"}
            onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.1)"}
          />
          <div style={{fontSize:11,color:"rgba(255,255,255,0.25)",marginBottom:16,lineHeight:1.6}}>
            We'll send a verification code via SMS. Standard rates may apply.
          </div>
          {error&&<div style={{color:"#FF6B6B",fontSize:12,marginBottom:12,padding:"8px 12px",
            background:"rgba(255,107,107,.1)",borderRadius:8}}>{error}</div>}
          <button onClick={sendOTP} disabled={loading}
            style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#6C63FF,#4F46E5)",
              border:"none",borderRadius:12,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",
              opacity:loading?.7:1}}>
            {loading?<span>SENDING <span className="spin" style={{display:"inline-block"}}>⟳</span></span>:"SEND CODE →"}
          </button>
        </>}

        {/* ── OTP step ── */}
        {step==="otp"&&<>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginBottom:20,textAlign:"center",lineHeight:1.7}}>
            Code sent to <span style={{color:"#6C63FF",fontWeight:600}}>{phone}</span>
          </div>
          <label style={{fontSize:11,color:"rgba(255,255,255,0.35)",letterSpacing:2,display:"block",marginBottom:8}}>
            6-DIGIT CODE
          </label>
          <input value={otp} onChange={e=>setOtp(e.target.value.replace(/\D/g,"").slice(0,6))}
            onKeyDown={e=>e.key==="Enter"&&verifyOTP()}
            placeholder="123456" maxLength={6}
            style={{...inputStyle,fontSize:22,letterSpacing:8,textAlign:"center"}}
            onFocus={e=>e.target.style.borderColor="rgba(108,99,255,.6)"}
            onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.1)"}
          />
          {error&&<div style={{color:"#FF6B6B",fontSize:12,marginBottom:12,padding:"8px 12px",
            background:"rgba(255,107,107,.1)",borderRadius:8}}>{error}</div>}
          <button onClick={verifyOTP} disabled={loading||otp.length<6}
            style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#6C63FF,#4F46E5)",
              border:"none",borderRadius:12,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",
              opacity:(loading||otp.length<6)?.5:1}}>
            {loading?<span>VERIFYING <span className="spin" style={{display:"inline-block"}}>⟳</span></span>:"VERIFY →"}
          </button>
          <div style={{textAlign:"center",marginTop:16,fontSize:12,color:"rgba(255,255,255,0.3)"}}>
            {timer>0
              ? `Resend in ${timer}s`
              : <span style={{color:"#6C63FF",cursor:"pointer"}} onClick={()=>{setStep("phone");setOtp("");}}>
                  ← Change number
                </span>
            }
          </div>
        </>}

        {/* ── Profile step ── */}
        {step==="profile"&&<>
          <label style={{fontSize:11,color:"rgba(255,255,255,0.35)",letterSpacing:2,display:"block",marginBottom:8}}>
            YOUR NAME
          </label>
          <input value={name} onChange={e=>setName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&saveProfile()}
            placeholder="Enter your name"
            maxLength={24}
            style={inputStyle}
            onFocus={e=>e.target.style.borderColor="rgba(108,99,255,.6)"}
            onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.1)"}
          />
          {/* Preview avatar */}
          {name&&<div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,
            padding:"12px 14px",background:"rgba(108,99,255,0.08)",
            border:"1px solid rgba(108,99,255,0.2)",borderRadius:12}}>
            <div style={{width:38,height:38,borderRadius:"50%",
              background:PALETTE[name.charCodeAt(0)%PALETTE.length]+"33",
              border:`2px solid ${PALETTE[name.charCodeAt(0)%PALETTE.length]}`,
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
              {AVATARS[name.charCodeAt(0)%AVATARS.length]}
            </div>
            <div>
              <div style={{color:"#fff",fontWeight:600}}>{name}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Your profile preview</div>
            </div>
          </div>}
          {error&&<div style={{color:"#FF6B6B",fontSize:12,marginBottom:12,padding:"8px 12px",
            background:"rgba(255,107,107,.1)",borderRadius:8}}>{error}</div>}
          <button onClick={saveProfile} disabled={loading}
            style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#6C63FF,#4F46E5)",
              border:"none",borderRadius:12,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",
              opacity:loading?.7:1}}>
            {loading?<span>SAVING... <span className="spin" style={{display:"inline-block"}}>⟳</span></span>:"START CHATTING →"}
          </button>
        </>}
      </div>
      <div id="recaptcha-container"/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   MAIN CHAT APP
═══════════════════════════════════════════ */
function ChatApp({user, onSignOut}){
  const [activeChat,  setActiveChat]  = useState(null); // null=lobby | {type:"group"|"dm", id, name, color, avatar}
  const [messages,    setMessages]    = useState([]);
  const [users,       setUsers]       = useState({});
  const [dmList,      setDmList]      = useState([]);  // [{uid, name, color, avatar, lastMsg, unread}]
  const [unreadMap,   setUnreadMap]   = useState({});
  const [input,       setInput]       = useState("");
  const [search,      setSearch]      = useState("");
  const [sidebarOpen, setSidebar]     = useState(true);
  const bottomRef = useRef(null);
  const presRef   = useRef(null);
  const presTimer = useRef(null);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[messages]);

  // ── Presence ──────────────────────────────
  useEffect(()=>{
    const write = ()=> db.ref(`presence/${user.uid}`).set({
      uid:user.uid, name:user.name, color:user.color,
      avatar:user.avatar, ts:Date.now(), online:true
    });
    write();
    presTimer.current = setInterval(write,10000);
    db.ref(`presence/${user.uid}`).onDisconnect().remove();
    return ()=>{ clearInterval(presTimer.current); db.ref(`presence/${user.uid}`).remove(); };
  },[user.uid]);

  // ── All users ─────────────────────────────
  useEffect(()=>{
    const ref = db.ref("users");
    ref.on("value", snap=>{
      setUsers(snap.val()||{});
    });
    return ()=> ref.off();
  },[]);

  // ── Messages for active chat ───────────────
  useEffect(()=>{
    if(!activeChat) return;
    const path = activeChat.type==="group"
      ? "groupMessages"
      : `dms/${dmKey(user.uid, activeChat.id)}`;
    const ref = db.ref(path).limitToLast(100);
    ref.on("value", snap=>{
      const data = snap.val()||{};
      setMessages(Object.values(data).sort((a,b)=>a.ts-b.ts));
    });
    // mark as read
    setUnreadMap(p=>({...p,[activeChat.id]:0}));
    return ()=> ref.off();
  },[activeChat]);

  // ── DM list + unread counts ────────────────
  useEffect(()=>{
    // Listen to all DMs involving this user
    const otherUids = Object.keys(users).filter(uid=>uid!==user.uid);
    const unsubs = [];
    otherUids.forEach(uid=>{
      const key = dmKey(user.uid, uid);
      const ref = db.ref(`dms/${key}`).limitToLast(1);
      const handler = snap=>{
        const data = snap.val();
        if(!data) return;
        const last = Object.values(data)[0];
        setDmList(prev=>{
          const filtered = prev.filter(d=>d.uid!==uid);
          const u = users[uid];
          if(!u) return filtered;
          return [...filtered,{uid,name:u.name,color:u.color,avatar:u.avatar,lastMsg:last,ts:last.ts}]
            .sort((a,b)=>(b.ts||0)-(a.ts||0));
        });
        // unread if not active
        if(!activeChat || activeChat.id!==uid){
          if(last.senderUid!==user.uid){
            setUnreadMap(p=>({...p,[uid]:(p[uid]||0)+1}));
          }
        }
      };
      ref.on("value", handler);
      unsubs.push(()=>ref.off("value",handler));
    });
    return ()=> unsubs.forEach(f=>f());
  },[users, activeChat]);

  const dmKey = (a,b)=> [a,b].sort().join("_");

  const sendMessage = async ()=>{
    const text=input.trim();
    if(!text||!activeChat) return;
    setInput("");
    const msg = {
      id:genId(), text,
      senderUid:user.uid, senderName:user.name,
      color:user.color, avatar:user.avatar,
      ts:Date.now()
    };
    const path = activeChat.type==="group"
      ? "groupMessages"
      : `dms/${dmKey(user.uid,activeChat.id)}`;
    await db.ref(path).push(msg);
  };

  const openDM = (uid)=>{
    const u = users[uid];
    if(!u) return;
    setActiveChat({type:"dm",id:uid,name:u.name,color:u.color,avatar:u.avatar});
    setUnreadMap(p=>({...p,[uid]:0}));
  };

  const filteredUsers = Object.values(users).filter(u=>
    u.uid!==user.uid && u.name?.toLowerCase().includes(search.toLowerCase())
  );

  const totalUnread = Object.values(unreadMap).reduce((a,b)=>a+b,0);

  /* ── group messages by date ── */
  const grouped = useMemo(()=>{
    const groups=[];
    let lastDate="";
    messages.forEach(m=>{
      const d=fmtDate(m.ts);
      if(d!==lastDate){ groups.push({type:"date",label:d}); lastDate=d; }
      groups.push({type:"msg",...m});
    });
    return groups;
  },[messages]);

  return(
    <div style={{height:"100vh",display:"flex",background:"#0e0e10",overflow:"hidden"}}>

      {/* ── SIDEBAR ─────────────────────────── */}
      <div style={{width:sidebarOpen?320:0,minWidth:sidebarOpen?320:0,
        background:"#16161a",borderRight:"1px solid rgba(255,255,255,0.06)",
        display:"flex",flexDirection:"column",transition:"all .25s",overflow:"hidden",flexShrink:0}}>

        {/* Header */}
        <div style={{padding:"18px 16px 12px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:36,height:36,borderRadius:"50%",
                background:user.color+"33",border:`2px solid ${user.color}`,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                {user.avatar}
              </div>
              <div>
                <div style={{color:"#fff",fontWeight:600,fontSize:14}}>{user.name}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>{user.phone}</div>
              </div>
            </div>
            <button onClick={onSignOut}
              style={{padding:"5px 10px",background:"rgba(255,255,255,0.05)",
                border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,
                color:"rgba(255,255,255,0.35)",fontSize:11,cursor:"pointer"}}>
              Sign out
            </button>
          </div>

          {/* Search */}
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",
              fontSize:14,color:"rgba(255,255,255,0.25)"}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Search users..."
              style={{width:"100%",padding:"9px 12px 9px 34px",
                background:"rgba(255,255,255,0.05)",
                border:"1px solid rgba(255,255,255,0.08)",
                borderRadius:10,color:"#fff",fontSize:13,outline:"none"}}
            />
          </div>
        </div>

        {/* Chat list */}
        <div style={{flex:1,overflowY:"auto",padding:"8px 8px"}}>

          {/* Group Chat */}
          <div style={{marginBottom:4}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.2)",
              letterSpacing:2,padding:"4px 8px 6px",fontWeight:600}}>CHANNELS</div>
            <div onClick={()=>setActiveChat({type:"group",id:"main",name:"Global Chat",
                color:"#6C63FF",avatar:"🌐"})}
              style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",
                borderRadius:12,cursor:"pointer",
                background:activeChat?.id==="main"?"rgba(108,99,255,0.15)":"transparent",
                border:activeChat?.id==="main"?"1px solid rgba(108,99,255,0.25)":"1px solid transparent",
                transition:"all .15s"}}>
              <div style={{width:40,height:40,borderRadius:12,
                background:"linear-gradient(135deg,#6C63FF33,#4F46E533)",
                border:"2px solid #6C63FF55",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🌐</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:"#fff",fontWeight:600,fontSize:14}}>Global Chat</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>Everyone can see this</div>
              </div>
            </div>
          </div>

          {/* DMs */}
          <div style={{marginTop:12}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.2)",
              letterSpacing:2,padding:"4px 8px 6px",fontWeight:600}}>DIRECT MESSAGES</div>

            {filteredUsers.length===0&&search&&(
              <div style={{padding:"20px 12px",textAlign:"center",
                color:"rgba(255,255,255,0.2)",fontSize:13}}>No users found</div>
            )}

            {filteredUsers.map(u=>{
              const isActive = activeChat?.id===u.uid;
              const unread   = unreadMap[u.uid]||0;
              const dmData   = dmList.find(d=>d.uid===u.uid);
              return(
                <div key={u.uid} onClick={()=>openDM(u.uid)}
                  style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",
                    borderRadius:12,cursor:"pointer",marginBottom:2,
                    background:isActive?"rgba(108,99,255,0.15)":"transparent",
                    border:isActive?"1px solid rgba(108,99,255,0.25)":"1px solid transparent",
                    transition:"all .15s"}}>
                  <div style={{position:"relative"}}>
                    <div style={{width:40,height:40,borderRadius:"50%",
                      background:u.color+"33",border:`2px solid ${u.color}55`,
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>
                      {u.avatar}
                    </div>
                    {unread>0&&<div style={{position:"absolute",top:-3,right:-3,
                      width:18,height:18,borderRadius:"50%",
                      background:"#6C63FF",display:"flex",alignItems:"center",
                      justifyContent:"center",fontSize:10,color:"#fff",fontWeight:700}}>
                      {unread>9?"9+":unread}
                    </div>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:"#fff",fontWeight:600,fontSize:14,
                      display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.name}</span>
                      {dmData&&<span style={{fontSize:10,color:"rgba(255,255,255,0.25)",flexShrink:0,marginLeft:6}}>
                        {fmt(dmData.ts)}
                      </span>}
                    </div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {dmData?.lastMsg
                        ? (dmData.lastMsg.senderUid===user.uid?"You: ":"")+dmData.lastMsg.text
                        : u.phone||"Tap to message"}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* ── MAIN AREA ───────────────────────── */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>

        {/* Top bar */}
        <div style={{height:58,padding:"0 18px",display:"flex",alignItems:"center",
          justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,0.06)",
          background:"#13131700",backdropFilter:"blur(12px)",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>setSidebar(s=>!s)}
              style={{width:36,height:36,background:"rgba(255,255,255,0.05)",
                border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,
                color:"rgba(255,255,255,0.6)",fontSize:16,cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
              ☰
              {!sidebarOpen&&totalUnread>0&&(
                <div style={{position:"absolute",top:-4,right:-4,width:16,height:16,
                  borderRadius:"50%",background:"#6C63FF",fontSize:9,color:"#fff",
                  display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>
                  {totalUnread>9?"9+":totalUnread}
                </div>
              )}
            </button>
            {activeChat&&<>
              <div style={{width:36,height:36,borderRadius:activeChat.type==="group"?10:"50%",
                background:activeChat.color+"33",border:`2px solid ${activeChat.color}55`,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                {activeChat.avatar}
              </div>
              <div>
                <div style={{color:"#fff",fontWeight:600,fontSize:15}}>{activeChat.name}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>
                  {activeChat.type==="group"
                    ? `${Object.keys(users).length} members`
                    : users[activeChat.id]?.phone||"Private message"}
                </div>
              </div>
            </>}
            {!activeChat&&<div style={{color:"rgba(255,255,255,0.4)",fontSize:14}}>
              Select a chat to start messaging
            </div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:"#34D399",
              boxShadow:"0 0 8px #34D399",animation:"pulse 2s infinite"}}/>
            <span style={{fontSize:11,color:"rgba(255,255,255,0.25)"}}>LIVE</span>
          </div>
        </div>

        {/* Messages */}
        <div style={{flex:1,overflowY:"auto",padding:"16px 20px 8px"}}>
          {!activeChat&&(
            <div style={{height:"100%",display:"flex",flexDirection:"column",
              alignItems:"center",justifyContent:"center",gap:14,
              color:"rgba(255,255,255,0.15)"}}>
              <div style={{fontSize:56}}>💬</div>
              <div style={{fontSize:16,fontWeight:600,letterSpacing:1}}>Welcome, {user.name}!</div>
              <div style={{fontSize:13,textAlign:"center",lineHeight:1.8,maxWidth:300}}>
                Select <span style={{color:"#6C63FF"}}>Global Chat</span> to talk to everyone,
                or pick a person from the list to send a private message.
              </div>
            </div>
          )}

          {activeChat&&grouped.map((item,i)=>{
            if(item.type==="date") return(
              <div key={i} style={{textAlign:"center",margin:"16px 0 10px"}}>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.25)",
                  background:"rgba(255,255,255,0.05)",padding:"4px 12px",borderRadius:20}}>
                  {item.label}
                </span>
              </div>
            );
            const isMe = item.senderUid===user.uid;
            const prev = grouped[i-1];
            const showHead = !prev||prev.type==="date"||prev.senderUid!==item.senderUid;
            return(
              <div key={item.id||i} style={{display:"flex",
                flexDirection:isMe?"row-reverse":"row",
                alignItems:"flex-end",gap:8,
                marginTop:showHead?12:3,animation:"fadeUp .15s ease"}}>
                {showHead
                  ?<div style={{width:32,height:32,borderRadius:"50%",
                      background:item.color+"33",border:`2px solid ${item.color}44`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:15,flexShrink:0}}>{item.avatar}</div>
                  :<div style={{width:32,flexShrink:0}}/>
                }
                <div style={{maxWidth:"65%"}}>
                  {showHead&&!isMe&&<div style={{fontSize:11,marginBottom:4,
                    color:item.color,fontWeight:600}}>
                    {item.senderName}
                    <span style={{color:"rgba(255,255,255,0.2)",fontWeight:400,marginLeft:8}}>{fmt(item.ts)}</span>
                  </div>}
                  <div style={{padding:"10px 14px",
                    background:isMe
                      ?`linear-gradient(135deg,${item.color}28,${item.color}18)`
                      :"rgba(255,255,255,0.06)",
                    border:isMe?`1px solid ${item.color}30`:"1px solid rgba(255,255,255,0.07)",
                    borderRadius:isMe?"16px 4px 16px 16px":"4px 16px 16px 16px",
                    color:"#f0f0f0",fontSize:14,lineHeight:1.55,wordBreak:"break-word"}}>
                    {item.text}
                  </div>
                  {isMe&&<div style={{fontSize:10,color:"rgba(255,255,255,0.2)",
                    textAlign:"right",marginTop:3}}>{fmt(item.ts)}</div>}
                </div>
              </div>
            );
          })}
          <div ref={bottomRef}/>
        </div>

        {/* Input */}
        {activeChat&&(
          <div style={{padding:"10px 18px 14px",borderTop:"1px solid rgba(255,255,255,0.06)",
            background:"rgba(13,13,15,0.95)",flexShrink:0}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
              <textarea value={input}
                onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}}
                placeholder={activeChat.type==="group"
                  ?`Message everyone…`:`Message ${activeChat.name}…`}
                rows={1}
                style={{flex:1,padding:"11px 14px",
                  background:"rgba(255,255,255,0.06)",
                  border:"1px solid rgba(255,255,255,0.1)",
                  borderRadius:12,color:"#fff",fontSize:14,
                  outline:"none",resize:"none",lineHeight:1.5,maxHeight:120}}
                onFocus={e=>e.target.style.borderColor="rgba(108,99,255,.5)"}
                onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.1)"}
              />
              <button onClick={sendMessage} disabled={!input.trim()}
                style={{width:44,height:44,flexShrink:0,
                  background:input.trim()?"linear-gradient(135deg,#6C63FF,#4F46E5)":"rgba(255,255,255,0.04)",
                  border:"none",borderRadius:12,
                  color:input.trim()?"#fff":"rgba(255,255,255,0.2)",
                  fontSize:18,cursor:input.trim()?"pointer":"default",
                  display:"flex",alignItems:"center",justifyContent:"center"}}>↑</button>
            </div>
            <div style={{marginTop:7,fontSize:10,color:"rgba(255,255,255,0.12)",letterSpacing:1}}>
              {activeChat.type==="dm"?"🔒 PRIVATE · ":"🌐 PUBLIC · "}ENTER TO SEND · SHIFT+ENTER FOR NEW LINE
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   ROOT
═══════════════════════════════════════════ */
function Root(){
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(()=>{
    if(!isReady||!auth){ setChecking(false); return; }
    const unsub = auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        try{
          const snap = await db.ref(`users/${fbUser.uid}`).once("value");
          if(snap.exists()) setUser(snap.val());
          else setUser(null);
        }catch{ setUser(null); }
      } else { setUser(null); }
      setChecking(false);
    });
    return unsub;
  },[]);

  if(!isReady) return <SetupScreen/>;

  if(checking) return(
    <div style={{height:"100vh",background:"#0e0e10",display:"flex",
      alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:44,filter:"drop-shadow(0 0 20px rgba(108,99,255,.7))"}}>💬</div>
      <div style={{color:"rgba(255,255,255,0.4)",fontSize:13,letterSpacing:2}}>LOADING...</div>
    </div>
  );

  if(!user) return <AuthScreen onAuth={setUser}/>;
  return <ChatApp user={user} onSignOut={()=>{ auth.signOut(); setUser(null); }}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
